; PlatformIO Configuration for JARVIS ESP32 Device
; Supports ESP32-S3 (recommended) and ESP32 WROOM

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.1
    bodmer/TFT_eSPI@^2.5.43
    madhephaestus/ESP32Servo@^3.0.5

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; TFT_eSPI display configuration (ST7789 240x240)
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=4
    -DSPI_FREQUENCY=80000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -DI2S_MIC_SCK=26
    -DI2S_MIC_WS=25
    -DI2S_MIC_SD=33
    -DI2S_SPK_BCK=27
    -DI2S_SPK_WS=14
    -DI2S_SPK_DATA=12

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2S_MIC_SCK=42
    -DI2S_MIC_WS=41
    -DI2S_MIC_SD=2
    -DI2S_SPK_BCK=17
    -DI2S_SPK_WS=18
    -DI2S_SPK_DATA=16
